name: Flutter APK Build

on:
  push:
    branches: [ "flutter-refactor" ]
  pull_request:
    branches: [ "flutter-refactor" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout代码
        uses: actions/checkout@v4

      - name: 🎯 设置Flutter环境
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.x'
          channel: 'stable'
          cache: true

      - name: 📦 安装项目依赖
        run: flutter pub get

      - name: ✅ 代码静态分析
        run: flutter analyze

      - name: 🔧 构建Release APK
        run: flutter build apk --release --split-per-abi

      - name: 📤 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: flutter-apk
          path: build/app/outputs/flutter-apk/*.apk
          retention-days: 30
