name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Install Android SDK 36
        run: |
          export ANDROID_HOME=/usr/local/lib/android/sdk
          export PATH=$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools:$PATH
          yes | sdkmanager --install "platforms;android-36" "build-tools;36.0.0" --sdk_root=$ANDROID_HOME 2>&1

      - name: Debug - List platforms
        run: |
          ls -la /usr/local/lib/android/sdk/platforms/ 2>/dev/null || echo "checking alternate paths..."
          ls -la $ANDROID_HOME/platforms/ 2>/dev/null
          echo "ANDROID_HOME=$ANDROID_HOME"

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Release APK
        run: ./gradlew assembleRelease --no-daemon 2>&1

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: douyin-downloader-release
          path: app/build/outputs/apk/release/app-release.apk
          if-no-files-found: warn
